<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steeven Recommends | Ajouter un produit</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-purple-50 px-4 py-10 text-gray-800">
    <main class="mx-auto grid w-full max-w-4xl gap-6 md:grid-cols-2">
      <section class="rounded-2xl bg-white p-6 shadow-md">
        <h1 class="text-2xl font-extrabold text-purple-700">Configuration d'envoi</h1>
        <p class="mt-2 text-sm text-gray-600">
          Pour éviter d'exposer des secrets dans le code, renseignez ici votre webhook et token.
        </p>

        <div class="mt-5 space-y-4">
          <label class="block text-sm font-semibold" for="webhookUrl">URL du webhook</label>
          <input id="webhookUrl" type="url" placeholder="https://..." class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" required />

          <label class="block text-sm font-semibold" for="authToken">Token Bearer (optionnel)</label>
          <input id="authToken" type="password" placeholder="Token API" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />

          <p class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">
            ⚠️ Cette page n'est pas une sécurité serveur. Pour une vraie protection, passez par une authentification côté backend.
          </p>
        </div>
      </section>

      <section class="rounded-2xl bg-white p-6 shadow-md">
        <h2 class="text-2xl font-extrabold text-purple-700">Ajout produit Amazon</h2>

        <form id="ajoutForm" class="mt-5 space-y-4" novalidate>
          <div>
            <label for="title" class="mb-1 block text-sm font-semibold">Nom du produit</label>
            <input id="title" name="title" type="text" required class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>

          <div>
            <label for="lien" class="mb-1 block text-sm font-semibold">Lien affilié Amazon</label>
            <input id="lien" name="lien" type="url" required class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>

          <div>
            <label for="description" class="mb-1 block text-sm font-semibold">Description</label>
            <textarea id="description" name="description" rows="4" required class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label for="price" class="mb-1 block text-sm font-semibold">Prix (optionnel)</label>
              <input id="price" name="price" type="text" placeholder="29,99 €" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
            </div>
            <div>
              <label for="image" class="mb-1 block text-sm font-semibold">Image URL (optionnel)</label>
              <input id="image" name="image" type="url" placeholder="https://..." class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
            </div>
          </div>

          <button id="submitButton" type="submit" class="w-full rounded-md bg-purple-600 py-2 font-semibold text-white transition hover:bg-purple-700">
            Envoyer
          </button>

          <p id="status" class="hidden rounded-md px-3 py-2 text-sm font-medium"></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('ajoutForm');
      const webhookUrlInput = document.getElementById('webhookUrl');
      const authTokenInput = document.getElementById('authToken');
      const submitButton = document.getElementById('submitButton');
      const statusElement = document.getElementById('status');

      const setStatus = (message, type) => {
        statusElement.textContent = message;
        statusElement.className = 'rounded-md px-3 py-2 text-sm font-medium';

        if (type === 'success') {
          statusElement.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
        } else if (type === 'error') {
          statusElement.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
        } else {
          statusElement.classList.add('bg-gray-50', 'text-gray-700', 'border', 'border-gray-200');
        }

        statusElement.classList.remove('hidden');
      };

      form?.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        if (!webhookUrlInput.value.trim()) {
          setStatus("Veuillez renseigner l'URL du webhook.", 'error');
          webhookUrlInput.focus();
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = 'Envoi en cours...';
        setStatus('Envoi en cours...', 'info');

        const formData = new FormData(form);
        const payload = {
          title: formData.get('title')?.toString().trim(),
          lien: formData.get('lien')?.toString().trim(),
          description: formData.get('description')?.toString().trim(),
          price: formData.get('price')?.toString().trim() || null,
          image: formData.get('image')?.toString().trim() || null,
          createdAt: new Date().toISOString()
        };

        const headers = {
          'Content-Type': 'application/json'
        };

        if (authTokenInput.value.trim()) {
          headers.Authorization = `Bearer ${authTokenInput.value.trim()}`;
        }

        try {
          const response = await fetch(webhookUrlInput.value.trim(), {
            method: 'POST',
            headers,
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`Erreur HTTP ${response.status}`);
          }

          form.reset();
          setStatus('Produit envoyé avec succès ✅', 'success');
        } catch (error) {
          setStatus(`Échec de l'envoi : ${error.message}`, 'error');
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Envoyer';
        }
      });
    </script>
  </body>
</html>
